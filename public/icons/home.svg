  />
  <rect
    class="inner"
    x="7.5"
    y="11.2"
    width="9"
    height="5"
    rx="1.2"
  />

  <!-- Door -->
  <path
    class="outer"
    d="M10 16.5 V13.2 H14 V16.5"
  />
