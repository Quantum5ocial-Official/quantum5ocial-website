<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="4.5 2.4 13.5 17.2"
  fill="none"
>
  <defs>
    <style>
      .outer {
        fill: none;
        stroke: #fff;
        stroke-width: 0.9px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .inner {
        fill: none;
        stroke: #fff;
        stroke-width: 0.45px;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.95;
      }
    </style>
  </defs>

  <!-- Roof (flatter, wider) -->
  <path
    class="outer"
    d="M6.2 8.4 L11.25 5.0 L16.3 8.4"
  />
  <path
    class="inner"
    d="M7.0 8.4 L11.25 5.6 L15.5 8.4"
  />

  <!-- Walls (taller like bell body) -->
  <path
    class="outer"
    d="M7.2 8.4 V16.1 H15.3 V8.4"
  />
  <path
    class="inner"
    d="M8.0 9.1 V15.3 H14.5 V9.1"
  />

  <!-- Base -->
  <path class="outer" d="M7.0 16.1 H15.5" />
  <path class="inner" d="M7.8 15.4 H14.7" />

  <!-- Door -->
  <path
    class="outer"
    d="M10.2 16.1 V11.6 H12.3 V16.1"
  />
  <path
    class="inner"
    d="M10.7 15.4 V12.3 H11.8 V15.4"
  />
</svg>
