<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="4.5 2.4 13.5 17.2"
  fill="none"
>
  <defs>
    <style>
      .outer {
        fill: none;
        stroke: #fff;
        stroke-width: 0.9px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .inner {
        fill: none;
        stroke: #fff;
        stroke-width: 0.45px;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.95;
      }
    </style>
  </defs>

  <!-- Roof (shifted slightly UP) -->
  <path
    class="outer"
    d="M6.0 9.2 L11.25 4.2 L16.5 9.2"
  />
  <path
    class="inner"
    d="M6.7 9.2 L11.25 5.0 L15.8 9.2"
  />

  <!-- House body -->
  <rect
    class="outer"
    x="7.2"
    y="9.2"
    width="8.1"
    height="5.2"
    rx="1.2"
  />
  <rect
    class="inner"
    x="8.0"
    y="9.9"
    width="6.5"
    height="4.2"
    rx="1.0"
  />

  <!-- Door -->
  <path
    class="outer"
    d="M10.1 14.4 V11.6 H12.4 V14.4"
  />
  <path
    class="inner"
    d="M10.6 14.4 V12.2 H11.9 V14.4"
  />
