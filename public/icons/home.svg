<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="3 2 18 18"
  fill="none"
>
  <defs>
    <style>
      .outer {
        fill: none;
        stroke: #fff;
        stroke-width: 0.9px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .inner {
        fill: none;
        stroke: #fff;
        stroke-width: 0.45px;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.95;
      }
    </style>
  </defs>

  <!-- Roof (raised higher) -->
  <path
    class="outer"
    d="M4.5 9.5 L12 3.8 L19.5 9.5"
  />
  <path
    class="inner"
    d="M5.5 9.5 L12 4.8 L18.5 9.5"
  />

  <!-- House body (slightly taller) -->
  <rect
    class="outer"
    x="6.5"
    y="9.5"
    width="11"
    height="7"
    rx="1.6"
  />
  <rect
    class="inner"
    x="7.5"
    y="10.2"
    width="9"
    height="6"
    rx="1.3"
  />

  <!-- Door -->
  <path
    class="outer"
    d="M10 16.5 V12.8 H14 V16.5"
  />
  <path
    class="inner"
    d="M10.8 16.5 V13.4 H13.2 V16.5"
  />
</svg>
