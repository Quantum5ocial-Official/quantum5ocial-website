<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="4.5 2.4 13.5 17.2"
  fill="none"
>
  <defs>
    <style>
      .outer {
        fill: none;
        stroke: #fff;
        stroke-width: 0.9px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .inner {
        fill: none;
        stroke: #fff;
        stroke-width: 0.45px;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.95;
      }
    </style>
  </defs>

  <!-- Roof: less inclined / flatter -->
  <path
    class="outer"
    d="M6.1 8.6 L11.25 5.0 L16.4 8.6"
  />
  <path
    class="inner"
    d="M6.9 8.6 L11.25 5.6 L15.6 8.6"
  />

  <!-- Walls: taller -->
  <path
    class="outer"
    d="M7.1 8.8 V15.6 H15.4 V8.8"
  />
  <path
    class="inner"
    d="M7.9 9.4 V14.9 H14.6 V9.4"
  />

  <!-- Base -->
  <path class="outer" d="M6.9 15.6 H15.6" />
  <path class="inner" d="M7.7 15.0 H14.8" />

  <!-- Door -->
  <path
    class="outer"
    d="M10.15 15.6 V11.5 H12.35 V15.6"
  />
  <path
    class="inner"
    d="M10.7 15.0 V12.2 H11.8 V15.0"
  />
</svg>
