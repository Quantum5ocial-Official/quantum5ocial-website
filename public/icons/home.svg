<?xml version="1.0" encoding="UTF-8"?>
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="4.5 2.4 13.5 17.2"
  fill="none"
>
  <defs>
    <style>
      .outer {
        fill: none;
        stroke: #fff;
        stroke-width: 0.9px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .inner {
        fill: none;
        stroke: #fff;
        stroke-width: 0.45px;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.95;
      }
    </style>
  </defs>

  <!-- Roof (wider → touches visual edges like other icons) -->
  <path
    class="outer"
    d="M5.4 8.5 L11.25 4.9 L17.1 8.5"
  />
  <path
    class="inner"
    d="M6.4 8.5 L11.25 5.6 L16.1 8.5"
  />

  <!-- Walls (expanded width) -->
  <path
    class="outer"
    d="M6.0 8.5 V16.2 H16.5 V8.5"
  />
  <path
    class="inner"
    d="M6.9 9.2 V15.4 H15.6 V9.2"
  />

  <!-- Base (full width like others) -->
  <path class="outer" d="M5.8 16.2 H16.7" />
  <path class="inner" d="M6.7 15.5 H15.8" />

  <!-- Door (scaled with new width) -->
  <path
    class="outer"
    d="M10.1 16.2 V11.5 H12.4 V16.2"
  />
  <path
    class="inner"
    d="M10.7 15.5 V12.2 H11.8 V15.5"
  />
</svg>
