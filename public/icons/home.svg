      .outer {
        fill: none;
        stroke: #fff;
        stroke-width: 0.9px;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .inner {
        fill: none;
        stroke: #fff;
        stroke-width: 0.45px;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.95;
      }
    </style>
  </defs>

  <!-- Roof -->
